# Grafana Cloud Alert Rules for Antigravity Server
# Reference: https://grafana.com/docs/grafana/latest/alerting/alerting-rules/
#
# Import via: Alerting > Alert rules > Import
# Requires: Prometheus datasource configured
#
apiVersion: 1

groups:
  - name: antigravity-critical
    folder: Antigravity
    interval: 1m
    rules:
      # ============================================================
      # ServerDown - Alert when uptime not increasing (server dead)
      # ============================================================
      - uid: antigravity-server-down
        title: ServerDown
        condition: C
        data:
          # Query A: Current uptime value
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: antigravity_uptime_seconds
              instant: true
              refId: A
          # Query B: Uptime value 2 minutes ago
          - refId: B
            relativeTimeRange:
              from: 240
              to: 120
            datasourceUid: ${datasource}
            model:
              expr: antigravity_uptime_seconds
              instant: true
              refId: B
          # Condition C: Alert if uptime not increasing (current <= previous or absent)
          - refId: C
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A <= $B or $A < 1"
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Antigravity server is down or not responding"
          description: "Server uptime is not increasing - current: {{ $values.A.Value }}s, previous: {{ $values.B.Value }}s"
          runbook_url: "Check systemd service: ssh vps-production 'systemctl status antigravity-server'"
        labels:
          severity: critical
          service: antigravity

      # ============================================================
      # AccountsLow - Alert when available accounts < 2
      # ============================================================
      - uid: antigravity-accounts-low
        title: AccountsLow
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: antigravity_accounts_available
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 2
                  operator:
                    type: and
                  reducer:
                    type: last
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Antigravity: Low available accounts ({{ $values.A.Value }})"
          description: "Only {{ $values.A.Value }} accounts available. Requests may fail due to account exhaustion."
          runbook_url: "Add more accounts or check account health status"
        labels:
          severity: warning
          service: antigravity

  - name: antigravity-warning
    folder: Antigravity
    interval: 1m
    rules:
      # ============================================================
      # HighErrorRate - Alert when error rate > 10% over 5 minutes
      # ============================================================
      - uid: antigravity-high-error-rate
        title: HighErrorRate
        condition: C
        data:
          # Query A: Total requests in last 5 minutes
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: sum(rate(antigravity_requests_total[5m])) or vector(0)
              instant: true
              refId: A
          # Query B: Error requests in last 5 minutes
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: sum(rate(antigravity_requests_total{status!="success"}[5m])) or vector(0)
              instant: true
              refId: B
          # Condition C: Alert if error rate > 10% and total requests > 0
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0 and ($B / $A) > 0.1"
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Antigravity: High error rate detected ({{ $values.B.Value | printf \"%.2f\" }}/{{ $values.A.Value | printf \"%.2f\" }})"
          description: "Error rate is above 10% threshold. Check upstream providers and account health."
          runbook_url: "Check logs: ssh vps-production 'journalctl -u antigravity-server -n 100'"
        labels:
          severity: warning
          service: antigravity

      # ============================================================
      # RateLimitingActive - Alert when rate limited accounts > 50%
      # ============================================================
      - uid: antigravity-rate-limiting
        title: RateLimitingActive
        condition: C
        data:
          # Query A: Total accounts
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: antigravity_accounts_total
              instant: true
              refId: A
          # Query B: Available accounts
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: antigravity_accounts_available
              instant: true
              refId: B
          # Condition C: Alert if (total - available) / total > 50%
          # This means more than 50% of accounts are unavailable (rate limited, forbidden, etc.)
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0 and (($A - $B) / $A) > 0.5"
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Antigravity: Rate limiting affecting >50% of accounts"
          description: "{{ $values.A.Value | printf \"%.0f\" }} total accounts, only {{ $values.B.Value | printf \"%.0f\" }} available. Many accounts may be rate limited."
          runbook_url: "Check account health via API: curl http://localhost:9101/api/health"
        labels:
          severity: warning
          service: antigravity

      # ============================================================
      # LatencyHigh - Alert when p95 latency > 5 seconds
      # ============================================================
      - uid: antigravity-latency-high
        title: LatencyHigh
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: histogram_quantile(0.95, sum by (le) (rate(antigravity_request_duration_seconds_bucket[5m])))
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 5
                  operator:
                    type: and
                  reducer:
                    type: last
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Antigravity: High latency detected (p95: {{ $values.A.Value | printf \"%.2f\" }}s)"
          description: "95th percentile latency is above 5 seconds. Check upstream provider performance."
          runbook_url: "Monitor upstream: check Gemini API status page"
        labels:
          severity: warning
          service: antigravity

      # ============================================================
      # StreamErrorsHigh - Alert when stream errors spike
      # ============================================================
      - uid: antigravity-stream-errors
        title: StreamErrorsHigh
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: sum(rate(antigravity_stream_total[5m])) or vector(0)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: sum(rate(antigravity_stream_errors_total[5m])) or vector(0)
              instant: true
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0 and ($B / $A) > 0.2"
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Antigravity: High stream error rate (>20%)"
          description: "Streaming connections are failing at a high rate. May indicate network issues or upstream problems."
          runbook_url: "Check network connectivity and SSE stream logs"
        labels:
          severity: warning
          service: antigravity

  - name: antigravity-aimd
    folder: Antigravity
    interval: 1m
    rules:
      # ============================================================
      # AIMDPenaltySpike - Alert when AIMD penalties spike (many 429s)
      # ============================================================
      - uid: antigravity-aimd-penalty-spike
        title: AIMDPenaltySpike
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: sum(rate(antigravity_aimd_penalties_total[5m])) * 60
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 10
                  operator:
                    type: and
                  reducer:
                    type: last
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Antigravity: AIMD penalty spike ({{ $values.A.Value | printf \"%.1f\" }}/min)"
          description: "High rate of AIMD penalties indicates many 429 errors. Adaptive limits are contracting aggressively."
          runbook_url: "Check account quotas and consider adding more accounts"
        labels:
          severity: warning
          service: antigravity

      # ============================================================
      # AIMDStagnation - Alert when no AIMD activity (system not learning)
      # ============================================================
      - uid: antigravity-aimd-stagnation
        title: AIMDStagnation
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: sum(increase(antigravity_aimd_rewards_total[1h])) or vector(0)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: sum(increase(antigravity_aimd_penalties_total[1h])) or vector(0)
              instant: true
              refId: B
          - refId: C
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "($A + $B) < 1"
        noDataState: OK
        execErrState: OK
        for: 1h
        annotations:
          summary: "Antigravity: AIMD system inactive for 1+ hour"
          description: "No AIMD rewards or penalties recorded. System may not be learning rate limits properly."
          runbook_url: "Verify adaptive_rate_limit.enabled=true in config"
        labels:
          severity: info
          service: antigravity

      # ============================================================
      # HedgeWinRateHigh - Alert when hedges win too often (primary too slow)
      # ============================================================
      - uid: antigravity-hedge-win-rate-high
        title: HedgeWinRateHigh
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: sum(increase(antigravity_hedge_wins_total[30m])) or vector(0)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: sum(increase(antigravity_hedged_requests_total[30m])) or vector(0)
              instant: true
              refId: B
          - refId: C
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$B > 10 and ($A / $B) > 0.5"
        noDataState: OK
        execErrState: OK
        for: 30m
        annotations:
          summary: "Antigravity: Hedge requests winning >50% of the time"
          description: "Primary requests are slow - hedges are winning {{ $values.A.Value | printf \"%.0f\" }}/{{ $values.B.Value | printf \"%.0f\" }} times. Consider increasing p95_latency_ms."
          runbook_url: "Tune hedging.p95_latency_ms in config"
        labels:
          severity: info
          service: antigravity

      # ============================================================
      # AdaptiveLimitFloor - Alert when accounts hitting min_limit floor
      # ============================================================
      - uid: antigravity-adaptive-limit-floor
        title: AdaptiveLimitFloor
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: count(antigravity_predicted_limit_gauge <= 10) or vector(0)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 2
                  operator:
                    type: and
                  reducer:
                    type: last
        noDataState: OK
        execErrState: OK
        for: 10m
        annotations:
          summary: "Antigravity: {{ $values.A.Value | printf \"%.0f\" }} accounts at adaptive limit floor"
          description: "Multiple accounts have hit the minimum limit floor (10 RPM). These accounts may be heavily rate-limited upstream."
          runbook_url: "Check account quotas or increase min_limit config"
        labels:
          severity: warning
          service: antigravity

      # ============================================================
      # ProbeFailureRate - Alert when cheap probes failing frequently
      # ============================================================
      - uid: antigravity-probe-failure-rate
        title: ProbeFailureRate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: sum(rate(antigravity_adaptive_probes_total{strategy="cheap_probe"}[10m])) * 600 or vector(0)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: sum(rate(antigravity_aimd_penalties_total[10m])) * 600 or vector(0)
              instant: true
              refId: B
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 5 and ($B / $A) > 0.3"
        noDataState: OK
        execErrState: OK
        for: 10m
        annotations:
          summary: "Antigravity: High probe failure rate (>30%)"
          description: "Cheap probes are triggering 429 errors frequently. Accounts may be near their true limits."
          runbook_url: "Consider lowering safety_margin or disabling cheap probes"
        labels:
          severity: info
          service: antigravity

      # ============================================================
      # AIMDHighPenaltyRate - Alert when penalties >> rewards (limit thrashing)
      # ============================================================
      - uid: antigravity-aimd-high-penalty
        title: AIMDHighPenaltyRate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: rate(antigravity_aimd_penalties_total[5m])
              refId: A
          - refId: B
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: rate(antigravity_aimd_rewards_total[5m])
              refId: B
          - refId: C
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 0.1 and $A > ($B * 3)"
        noDataState: OK
        execErrState: OK
        for: 15m
        annotations:
          summary: "Antigravity: AIMD limit thrashing (penalties >> rewards)"
          description: "Penalties: {{ $values.A.Value }}/min, Rewards: {{ $values.B.Value }}/min. Accounts hitting limits too frequently."
          runbook_url: "Increase safety_margin or reduce account load"
        labels:
          severity: warning
          service: antigravity

      # ============================================================
      # AIMDLimitCollapse - Alert when predicted limits drop significantly
      # ============================================================
      - uid: antigravity-aimd-limit-collapse
        title: AIMDLimitCollapse
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: sum(antigravity_predicted_limit_gauge)
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 1920
              to: 1800
            datasourceUid: ${datasource}
            model:
              expr: sum(antigravity_predicted_limit_gauge)
              instant: true
              refId: B
          - refId: C
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "($A / $B) < 0.5 and $B > 100"
        noDataState: OK
        execErrState: OK
        for: 5m
        annotations:
          summary: "Antigravity: Total predicted limits dropped >50%"
          description: "Limits dropped from {{ $values.B.Value }} to {{ $values.A.Value }} RPM. Possible upstream throttling."
          runbook_url: "Check upstream API status and recent 429 patterns"
        labels:
          severity: critical
          service: antigravity

      # ============================================================
      # AIMDLowHedgeWinRate - Alert when hedges are losing too often
      # ============================================================
      - uid: antigravity-aimd-low-hedge-win
        title: AIMDLowHedgeWinRate
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: antigravity_hedge_win_rate
              instant: true
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 0.3
                  operator:
                    type: and
                  reducer:
                    type: last
        noDataState: OK
        execErrState: OK
        for: 30m
        annotations:
          summary: "Antigravity: Low hedge win rate (<30%)"
          description: "Hedge requests are completing first only {{ $values.A.Value | humanizePercentage }}. Primary requests may be too slow."
          runbook_url: "Check upstream latency or reduce hedge_delay_ms"
        labels:
          severity: info
          service: antigravity

      # ============================================================
      # AIMDNoProbeActivity - Alert when adaptive probing stops completely
      # ============================================================
      - uid: antigravity-aimd-no-probes
        title: AIMDNoProbeActivity
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: ${datasource}
            model:
              expr: rate(antigravity_adaptive_probes_total[5m])
              refId: A
          - refId: B
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 0.01
                  operator:
                    type: and
                  reducer:
                    type: last
        noDataState: OK
        execErrState: OK
        for: 30m
        annotations:
          summary: "Antigravity: No adaptive probe activity detected"
          description: "Adaptive probing has stopped. Check if feature is disabled or all accounts are at safe levels."
          runbook_url: "Verify adaptive_rate_limit.enabled=true in config"
        labels:
          severity: info
          service: antigravity
