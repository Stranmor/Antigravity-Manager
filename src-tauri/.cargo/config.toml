[build]
jobs = 16

[profile.dev]
opt-level = 0
debug = 0
incremental = true
codegen-units = 256

[profile.dev.package."*"]
opt-level = 1
debug = false

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3
strip = true

[profile.release-fast]
inherits = "release"
lto = false
codegen-units = 16
strip = false

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld", "-C", "target-cpu=native"]
