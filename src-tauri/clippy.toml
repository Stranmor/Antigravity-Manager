# Clippy configuration for Antigravity Tools
# See: https://rust-lang.github.io/rust-clippy/stable/

# Set cognitive complexity threshold (default is 25)
cognitive-complexity-threshold = 50

# Allow long function signatures (default is 7)
too-many-arguments-threshold = 10

# Allow longer type names
type-complexity-threshold = 500

# Single char binding names to allow
allowed-idents-below-min-chars = ["i", "j", "k", "n", "x", "y", "z", "_"]

# Allow common prefixes that might trigger doc-markdown lint
doc-valid-idents = ["Claude", "Gemini", "OpenAI", "Anthropic", "SSE", "API", "OAuth", "JSON", "HTTP", "HTTPS", "WebSocket", "LLM"]
